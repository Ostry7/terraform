name: Project2_DR_failback

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Enter FAILBACK to restore primary"
        required: true

jobs:
  failback:
    runs-on: ubuntu-slim
    if: github.event.inputs.confirm == 'FAILBACK'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Get AKS credentials (DR site)
        run: |
          az aks get-credentials \
            --resource-group gitops_rg2345234_dr \
            --name aks-dr-234623465 \
            --context aks-dr

      - name: Verify DR is primary
        run: |
          kubectl --context=aks-dr exec cnpg-cluster-dr-1 -n prod -- \
            psql -U postgres -c "SELECT pg_is_in_recovery();"

      - name: Freeze application writes
        run: |
          kubectl patch configmap db-config -n prod \
            --type=merge \
            -p '{"data":{"db_mode":"FAILBACK_IN_PROGRESS"}}'

      - name: Restart applications (freeze mode)
        run: |
          kubectl rollout restart deployment/devops-app -n prod
          kubectl rollout status deployment/devops-app -n prod --timeout=120s

      - name: Get AKS credentials (primary)
        run: |
          az aks get-credentials \
            --resource-group gitops_rg2345234 \
            --name example-aks1_test234

      - name: Restore primary from DR
        run: |
          kubectl apply -f \
            "GitOps-Based Kubernetes Platform on Azure/database/prod/cnpg.yaml"

          kubectl wait --for=condition=Ready cluster/cnpg-cluster-primary \
            -n prod --timeout=600s

      - name: Promote primary
        run: |
          kubectl patch cluster cnpg-cluster-primary \
            --type=merge \
            -p '{"spec":{"replica":{"enabled":false}}}' \
            -n prod

      - name: Set DR back to replica
        run: |
          kubectl --context=aks-dr patch cluster cnpg-cluster-dr \
            --type=merge \
            -p '{"spec":{"replica":{"enabled":true}}}' \
            -n prod

      - name: Update db_mode back to PRIMARY
        run: |
          kubectl patch configmap db-config -n prod \
            --type=merge \
            -p '{"data":{"db_mode":"PRIMARY"}}'

      - name: Restart applications
        run: |
          kubectl rollout restart deployment/devops-app -n prod
          kubectl rollout status deployment/devops-app -n prod --timeout=120s

      - name: Verify primary is active
        run: |
          kubectl exec cnpg-cluster-primary-1 -n prod -- \
            psql -U postgres -c "SELECT pg_is_in_recovery();"