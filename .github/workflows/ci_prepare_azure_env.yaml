name: ci_prepare_azure_env.yaml
on:
  workflow_dispatch:
  push:
    branches:
      - features
    paths: 
      - 'Azure AKS Deployment Pipeline/terraform/**'  #runs only if any changes on terraform dir

env:
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  terraform_lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        working-directory: "Azure AKS Deployment Pipeline/terraform/"
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: "Azure AKS Deployment Pipeline/terraform/"
        run: |
          terraform init -backend=false
          terraform validate
          
  create_azure_env:
    needs: terraform_lint 
    if: needs.terraform_lint.result == 'success' #runs only if terraform lint completed successfuly
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Terraform Init
        working-directory: "Azure AKS Deployment Pipeline/terraform/"
        run: terraform init

      - name: Terraform Plan
        working-directory: "Azure AKS Deployment Pipeline/terraform/"
        run: terraform plan

      - name: Terraform Apply
        working-directory: "Azure AKS Deployment Pipeline/terraform/"
        run: terraform apply -auto-approve

  acr_push:
    needs: create_azure_env 
    if: needs.create_azure_env.result == 'success' #runs only if create_acure_env completed successfuly
    runs-on: ubuntu-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Enable ACR Admin
        run: az acr update -n acrapp01 --admin-enabled true

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: acrapp01.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push to ACR
        run: |
          az acr build \
            --registry acrapp01 \
            --image devops-app:latest \
            --file "Azure AKS Deployment Pipeline/app/Dockerfile" \
            "Azure AKS Deployment Pipeline/app/"