apiVersion: v1
kind: Service
metadata:
  name: cnpg-primary-internal-lb
  namespace: prod
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    cnpg.io/cluster: cnpg-cluster-primary
    cnpg.io/podRole: instance
  ports:
    - port: 5432
      targetPort: 5432