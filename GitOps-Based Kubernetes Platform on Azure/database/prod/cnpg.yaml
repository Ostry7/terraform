apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cnpg-cluster-primary
  namespace: prod
spec:
  instances: 1
  bootstrap:
    initdb:
      database: devops_db
      owner: app

  backup:
    barmanObjectStore:
      destinationPath: "<storage_account_path>"
      azureCredentials:
        inheritFromAzureAD: true
      wal:
        compression: gzip
    retentionPolicy: "2d"

  storage:
    size: 1Gi